upstream edu_metric_frontend {
    server frontend:3005;
}

upstream edu_metric_api {
    server gateway:8080;
}

server {
    listen 80;
    server_name shahzod.app www.shahzod.app;

    location / {
        proxy_pass http://edu_metric_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 80;
    server_name api.shahzod.app;

    client_max_body_size 25m;

    location / {
        proxy_pass http://edu_metric_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
